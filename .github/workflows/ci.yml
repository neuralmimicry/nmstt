name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (${{ matrix.runner_arch }})
    timeout-minutes: 45
    runs-on:
      - self-hosted
      - Linux
      - ${{ matrix.runner_arch }}
    strategy:
      fail-fast: false
      matrix:
        runner_arch: [X64, ARM64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install native dependencies
        run: |
          missing=0

          command -v clang >/dev/null 2>&1 || missing=1
          command -v cmake >/dev/null 2>&1 || missing=1
          command -v pkg-config >/dev/null 2>&1 || missing=1
          dpkg -s libclang-dev >/dev/null 2>&1 || missing=1

          if [ "$missing" -eq 1 ]; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              clang \
              cmake \
              libclang-dev \
              pkg-config
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Build release binary
        run: cargo build --locked --release -j 1

      - name: Run tests
        run: cargo test --locked --all-targets

  container:
    name: Container (${{ matrix.runner_arch }})
    needs: rust
    timeout-minutes: 45
    runs-on:
      - self-hosted
      - Linux
      - ${{ matrix.runner_arch }}
    strategy:
      fail-fast: false
      matrix:
        runner_arch: [X64, ARM64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build container image
        run: |
          if command -v podman >/dev/null 2>&1; then
            podman build -f Containerfile -t nmstt-ci:${{ matrix.runner_arch }} .
          elif command -v docker >/dev/null 2>&1; then
            DOCKER_BUILDKIT=0 docker build --pull -f Containerfile -t nmstt-ci:${{ matrix.runner_arch }} .
          else
            echo "Neither podman nor docker is available on this runner." >&2
            exit 1
          fi

      - name: Remove container image
        if: always()
        run: |
          if command -v podman >/dev/null 2>&1; then
            podman image rm localhost/nmstt-ci:${{ matrix.runner_arch }} || podman image rm nmstt-ci:${{ matrix.runner_arch }} || true
          elif command -v docker >/dev/null 2>&1; then
            docker image rm nmstt-ci:${{ matrix.runner_arch }} || true
          fi
